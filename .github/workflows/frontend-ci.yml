name: Frontend CI (Next.js)

on:
  push:
    branches:
      - "feature/*"
      - develop
    paths:
      - "frontend/**"

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      #  แจ้งเตือนเมื่อสำเร็จ
      - name: Notify Discord (Success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ Frontend: ${GITHUB_REF_NAME} build success\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      #  แจ้งเตือนเมื่อ fail
      - name: Notify Discord (Fail)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"❌ Frontend: ${GITHUB_REF_NAME} build failed\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}